<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "FastAPI Auth" }}</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #16202a;
        }

        body {
            margin: 0;
        }

        main {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 16px;
            box-sizing: border-box;
        }

        .panel {
            width: min(100%, 560px);
            background: #ffffff;
            border: 1px solid #d9e0e7;
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(20, 31, 43, 0.08);
        }

        h1 {
            margin: 0 0 20px;
            font-size: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        label {
            display: grid;
            gap: 6px;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #b9c4cf;
            border-radius: 6px;
            padding: 11px 12px;
            font: inherit;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 6px;
            padding: 12px 16px;
            background: #1769aa;
            color: white;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .link-row {
            margin-top: 18px;
            text-align: center;
        }

        a {
            color: #1769aa;
            font-weight: 700;
            text-decoration: none;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            background: #ffe9e9;
            color: #8a1f1f;
            border: 1px solid #f3b5b5;
        }

        .notice {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            background: #e9f6ef;
            color: #166239;
            border: 1px solid #b7dfc8;
        }

        .details {
            display: grid;
            gap: 10px;
            margin-bottom: 22px;
        }

        .details div {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid #edf1f5;
            padding-bottom: 10px;
        }

        .details span {
            color: #607080;
        }

        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .panel {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="panel">
            {% block content %}{% endblock %}
        </section>
    </main>
</body>
</html>
